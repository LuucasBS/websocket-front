spring:
  application:
    name: websocket-back
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chatdb}
    username: ${DB_USER:chat}
    password: ${DB_PASS:chat}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  threads:
    virtual:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-me-dev-only-secret-key-change-me-dev-only-secret-key-change-me}
    expiration: ${JWT_EXPIRATION:28800}
  websocket:
    heartbeat: ${WS_HEARTBEAT:25000}
    disconnect-delay: ${WS_DISCONNECT_DELAY:5000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html