<main class="min-h-screen bg-neutral-950 p-0 text-zinc-100 sm:p-4">
  <section class="mx-auto flex h-screen w-full max-w-6xl flex-col rounded-none border border-zinc-800 bg-zinc-900/60 sm:h-[92vh] sm:rounded-2xl">
    <app-chat-header
      [title]="activeUserName()"
      [subtitle]="typingIndicator() ? 'digitando...' : 'conversa privada'"
      [connected]="isConnected()"
      (onBack)="backToLobby()"
    ></app-chat-header>

    <div class="flex-1 overflow-y-auto px-3 py-4 sm:px-5">
      @if (loadingHistory()) {
        <div class="space-y-3">
          @for (item of [1, 2, 3, 4, 5]; track item) {
            <div class="h-12 w-2/3 animate-pulse rounded-xl bg-zinc-800/70"></div>
          }
        </div>
      } @else {
        <div class="space-y-2">
          @for (message of messages(); track trackByMessage($index, message)) {
            <div [@fadeIn] [@slideUp]>
              <app-message-bubble [message]="message" [isOwn]="isOwnMessage(message)"></app-message-bubble>
            </div>
          }

          <div #endAnchor></div>
        </div>
      }
    </div>

    <footer class="border-t border-zinc-800 p-3 sm:p-4">
      <label class="mb-2 block text-xs text-zinc-400">Mensagem (Enter envia, Shift+Enter quebra linha)</label>
      <textarea
        #draftField
        rows="3"
        class="w-full resize-none rounded-xl border border-zinc-700 bg-zinc-950 p-3 font-mono text-sm outline-none transition focus:border-cyan-400"
        [value]="draft()"
        (input)="onDraftInput(draftField.value)"
        (keydown)="onInputKeydown($event)"
        placeholder="Digite sua mensagem..."
      ></textarea>

      <div class="mt-2 flex items-center justify-between">
        <span class="text-xs" [class.text-zinc-400]="charCount() < 500" [class.text-red-300]="charCount() >= 500">
          {{ charCount() }}/255 
        </span>

        <button
          type="button"
          class="rounded-md bg-linear-to-r from-emerald-400 to-cyan-400 px-4 py-2 text-sm font-semibold text-black transition disabled:cursor-not-allowed disabled:opacity-40"
          [disabled]="!canSend()"
          (click)="sendMessage()"
        >
          Enviar
        </button>
      </div>
    </footer>
  </section>
</main>
