<header class="flex items-center justify-between gap-3 border-b border-zinc-800 px-4 py-3 sm:px-5">
  <div class="flex items-center gap-3">
    <button
      type="button"
      class="rounded-md border border-zinc-700 px-2 py-1 text-sm text-zinc-300 transition hover:border-cyan-400 hover:text-cyan-300"
      (click)="back()"
    >
      voltar
    </button>

    <div>
      <h2 class="text-base font-semibold text-cyan-300">{{ title() }}</h2>
      <p class="text-xs text-zinc-400">{{ subtitle() }}</p>
    </div>
  </div>

  <div class="flex items-center gap-2 text-xs text-zinc-400">
    <span class="h-2 w-2 rounded-full" [class.bg-emerald-400]="connected()" [class.bg-red-400]="!connected()"></span>
    {{ connected() ? 'online' : 'reconectando' }}
  </div>
</header>
