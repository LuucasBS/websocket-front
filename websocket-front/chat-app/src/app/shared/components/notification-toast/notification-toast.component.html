<section class="pointer-events-none fixed right-4 top-4 z-50 flex w-full max-w-sm flex-col gap-3">
  @for (toast of notifications.toasts(); track toast.id) {
    <article
      class="pointer-events-auto rounded-xl border border-emerald-400/30 bg-zinc-900/90 p-3 shadow-[0_8px_30px_rgba(0,255,157,0.15)] backdrop-blur-sm animate-slide-in"
    >
      <header class="mb-1 flex items-center justify-between gap-2">
        <strong class="text-sm text-emerald-300">{{ toast.title }}</strong>
        <button
          type="button"
          class="text-xs text-zinc-400 transition hover:text-white"
          (click)="notifications.dispensarToast(toast.id)"
        >
          fechar
        </button>
      </header>
      <p class="text-sm text-zinc-100">{{ toast.body }}</p>
    </article>
  }
</section>
